name: Generate PGO Profdata

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout x264
      uses: actions/checkout@v4
      with:
        path: x264
        fetch-depth: 0

    - name: Cache FFmpeg
      id: cache-ff
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-full-v2-clang

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ff.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.2.8

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          autoconf
          automake
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-compiler-rt
          mingw-w64-clang-x86_64-lld
          mingw-w64-clang-x86_64-crt
          mingw-w64-clang-x86_64-headers
          mingw-w64-clang-x86_64-libc++
          mingw-w64-clang-x86_64-libwinpthread
          mingw-w64-clang-x86_64-make
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-llvm

    - name: Compile FFmpeg (full with avfilter)
      run: |
        PGO_OPT="--enable-avdevice --enable-avfilter --enable-ffmpeg --enable-indev=lavfi"
        for f in testsrc testsrc2 smptebars smptehdbars nullsrc geq gradients format scale noise; do
          PGO_OPT="$PGO_OPT --enable-filter=$f"
        done
        ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec --enable-swscale --enable-swresample \
          --disable-everything --disable-network $PGO_OPT \
          --enable-demuxer=mpegts,mov,matroska,h264,hevc,rawvideo,yuv4mpegpipe \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-encoder=rawvideo,aac,ac3,mp2,pcm_s16le,pcm_s24le,pcm_s32le \
          --enable-muxer=yuv4mpegpipe \
          --enable-protocol=file,pipe \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)
      working-directory: ffmpeg
      if: steps.cache-ff.outputs.cache-hit != 'true'

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      run: make install
      working-directory: ffmpeg

    - name: Compile mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
      working-directory: mimalloc

    - name: Install mimalloc
      run: ninja install
      working-directory: mimalloc/build

    - name: Compile obuparse
      run: make CC=cc libobuparse.a
      working-directory: obuparse

    - name: Install obuparse
      run: |
        install -d /usr/local/include
        install -d /usr/local/lib
        install -v obuparse.h /usr/local/include
        install -v libobuparse.a /usr/local/lib
      working-directory: obuparse

    - name: Compile L-SMASH
      run: |
        ./configure --prefix=/usr/local --cc=cc --extra-cflags="-I/usr/local/include" \
          --extra-ldflags="-L/usr/local/lib" --extra-libs="-lobuparse"
        make -j$(nproc)
      working-directory: lsmash

    - name: Install L-SMASH
      run: |
        make install
        cp importer/importer.h /usr/local/include/lsmash_importer.h
      working-directory: lsmash

    - name: Setup build dir
      run: mkdir -p build/all

    - name: Compile x264 (profiling)
      working-directory: build/all
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=x86-64
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=all --enable-lto --enable-static \
          --extra-cflags="-O2 -flto=thin -fmerge-all-constants -fprofile-instr-generate -fprofile-update=atomic -I/usr/local/include -I/clang64/include -I../../ffmpeg" \
          --extra-ldflags="-flto=thin -fprofile-instr-generate -L/usr/local/lib -L/clang64/lib"
        make -j$(nproc)
        mv x264.exe x264-profiling.exe

    - name: Generate test videos for PGO
      working-directory: build
      run: |
        mkdir -p test-videos

        # === Resolution & Frame Rate Coverage ===
        # 4K high motion
        ffmpeg -f lavfi -i "testsrc=duration=2:size=3840x2160:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/4k_30fps.y4m
        # 1080p standard
        ffmpeg -f lavfi -i "testsrc=duration=4:size=1920x1080:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_30fps.y4m
        # 1080p high framerate
        ffmpeg -f lavfi -i "testsrc2=duration=3:size=1920x1080:rate=60" -c:v rawvideo -pix_fmt yuv420p test-videos/1080p_60fps.y4m
        # 720p film
        ffmpeg -f lavfi -i "testsrc=duration=4:size=1280x720:rate=24" -c:v rawvideo -pix_fmt yuv420p test-videos/720p_24fps.y4m
        # 720p PAL
        ffmpeg -f lavfi -i "testsrc2=duration=3:size=1280x720:rate=25" -c:v rawvideo -pix_fmt yuv420p test-videos/720p_25fps.y4m
        # 480p SD
        ffmpeg -f lavfi -i "smptebars=duration=3:size=854x480:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/480p_smpte.y4m
        # Low res
        ffmpeg -f lavfi -i "testsrc=duration=3:size=640x360:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/360p_30fps.y4m

        # === Motion & Content Types ===
        # High detail noise
        ffmpeg -f lavfi -i "nullsrc=s=1280x720:r=30,geq=random(1)*255:random(1)*255:random(1)*255" -t 2 -c:v rawvideo -pix_fmt yuv420p test-videos/noise_color.y4m
        # Film grain simulation
        ffmpeg -f lavfi -i "testsrc=duration=3:size=1280x720:rate=30,noise=alls=20:allf=t" -c:v rawvideo -pix_fmt yuv420p test-videos/film_grain.y4m
        # Smooth gradient
        ffmpeg -f lavfi -i "gradients=s=1280x720:c0=000000:c1=ffffff" -t 2 -c:v rawvideo -pix_fmt yuv420p test-videos/gradient_gray.y4m
        # Color gradient
        ffmpeg -f lavfi -i "gradients=s=1280x720:c0=ff0000:c1=00ff00:c2=0000ff" -t 2 -c:v rawvideo -pix_fmt yuv420p test-videos/gradient_rgb.y4m
        # SMPTE color bars
        ffmpeg -f lavfi -i "smptebars=duration=2:size=1920x1080:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/smpte_1080p.y4m
        # HD color bars
        ffmpeg -f lavfi -i "smptehdbars=duration=2:size=1920x1080:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/smptehd_1080p.y4m

        echo "=== Test videos generated ==="
        ls -la test-videos/

    - name: Run PGO profiling workload
      working-directory: build/all
      run: |
        # === Preset definitions ===
        OPT8_ULTRAFAST="--crf 28 --preset ultrafast --threads 4"
        OPT8_FASTER="--crf 26 --preset faster --threads 4"
        OPT8_FAST="--crf 24 --preset fast --threads 4"
        OPT8_MEDIUM="--crf 22 --preset medium --threads 4"
        OPT8_MEDIUM_AQ="--crf 24 --preset medium --aq-mode 2 --threads 4"
        OPT8_SLOW="--crf 20 --preset slow --threads 4"
        OPT8_SLOWER="--crf 22 --preset slower --threads 2"
        OPT8_VERYSLOW="--crf 20 --preset veryslow --threads 2"
        OPT8_PSY="--crf 22 --preset medium --psy-rd 1.0:0.15 --aq-mode 3 --threads 4"

        OPT10_ULTRAFAST="--output-depth 10 --crf 28 --preset ultrafast --threads 4"
        OPT10_FASTER="--output-depth 10 --crf 26 --preset faster --threads 4"
        OPT10_MEDIUM="--output-depth 10 --crf 22 --preset medium --threads 4"
        OPT10_MEDIUM_AQ="--output-depth 10 --crf 24 --preset medium --aq-mode 2 --threads 4"
        OPT10_SLOW="--output-depth 10 --crf 20 --preset slow --threads 4"
        OPT10_PSY="--output-depth 10 --crf 22 --preset medium --psy-rd 1.0:0.15 --aq-mode 3 --threads 4"

        echo "=== 8-bit Primary Resolution Tests ==="
        for opt in "$OPT8_MEDIUM" "$OPT8_MEDIUM_AQ" "$OPT8_SLOW" "$OPT8_PSY"; do
          ./x264-profiling.exe $opt ../test-videos/1080p_30fps.y4m -o /dev/null 2>/dev/null || true
        done
        for opt in "$OPT8_MEDIUM" "$OPT8_SLOW"; do
          ./x264-profiling.exe $opt ../test-videos/1080p_60fps.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 8-bit 720p Tests ==="
        for opt in "$OPT8_MEDIUM" "$OPT8_PSY"; do
          ./x264-profiling.exe $opt ../test-videos/720p_24fps.y4m -o /dev/null 2>/dev/null || true
          ./x264-profiling.exe $opt ../test-videos/720p_25fps.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 8-bit 4K Test ==="
        ./x264-profiling.exe $OPT8_MEDIUM ../test-videos/4k_30fps.y4m -o /dev/null 2>/dev/null || true

        echo "=== 8-bit Motion & Content Type Tests ==="
        for opt in "$OPT8_MEDIUM" "$OPT8_PSY"; do
          ./x264-profiling.exe $opt ../test-videos/film_grain.y4m -o /dev/null 2>/dev/null || true
          ./x264-profiling.exe $opt ../test-videos/gradient_gray.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 8-bit Preset Coverage Tests ==="
        for opt in "$OPT8_ULTRAFAST" "$OPT8_FASTER" "$OPT8_FAST"; do
          ./x264-profiling.exe $opt ../test-videos/480p_smpte.y4m -o /dev/null 2>/dev/null || true
          ./x264-profiling.exe $opt ../test-videos/360p_30fps.y4m -o /dev/null 2>/dev/null || true
        done
        for opt in "$OPT8_SLOWER" "$OPT8_VERYSLOW"; do
          ./x264-profiling.exe $opt ../test-videos/480p_smpte.y4m -o /dev/null 2>/dev/null || true
        done

        echo "=== 10-bit Tests ==="
        for opt in "$OPT10_MEDIUM" "$OPT10_MEDIUM_AQ" "$OPT10_SLOW" "$OPT10_PSY"; do
          ./x264-profiling.exe $opt ../test-videos/1080p_30fps.y4m -o /dev/null 2>/dev/null || true
        done
        for opt in "$OPT10_MEDIUM" "$OPT10_SLOW"; do
          ./x264-profiling.exe $opt ../test-videos/720p_24fps.y4m -o /dev/null 2>/dev/null || true
        done
        for opt in "$OPT10_ULTRAFAST" "$OPT10_FASTER"; do
          ./x264-profiling.exe $opt ../test-videos/480p_smpte.y4m -o /dev/null 2>/dev/null || true
        done

        llvm-profdata merge -output=../x264.profdata *.profraw
        echo "=== Profile data generated ==="
        ls -la ../x264.profdata

    - name: Push profdata to branch
      shell: bash
      run: |
        cd x264
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout --orphan profdata-x86-64
        git rm -rf . 2>/dev/null || true
        cp ../build/x264.profdata ./x264.profdata
        git add x264.profdata
        git commit -m "Update PGO profdata - $(date +%Y%m%d-%H%M)"
        git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git profdata-x86-64
