name: Update Dependencies

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest FFmpeg release
        id: ffmpeg
        run: |
          # Get all tags and filter release versions (nX.Y format)
          TAG=$(curl -s "https://api.github.com/repos/FFmpeg/FFmpeg/tags?per_page=100" | \
            jq -r '.[].name' | \
            grep -E '^n[0-9]+\.[0-9]+$' | \
            sort -Vr | \
            head -1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "FFmpeg latest release: $TAG"

      - name: Get latest mimalloc release
        id: mimalloc
        run: |
          # Get latest release tag
          TAG=$(curl -s "https://api.github.com/repos/microsoft/mimalloc/releases/latest" | \
            jq -r '.tag_name')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "mimalloc latest release: $TAG"

      - name: Get current versions
        id: current
        run: |
          FFMPEG=$(grep -oP 'ref: n[0-9]+\.[0-9]+' .github/workflows/build.yml | head -1 | grep -oP 'n[0-9]+\.[0-9]+')
          MIMALLOC=$(grep -oP 'ref: v[0-9]+\.[0-9]+\.[0-9]+' .github/workflows/build.yml | head -1 | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+')
          echo "ffmpeg=$FFMPEG" >> $GITHUB_OUTPUT
          echo "mimalloc=$MIMALLOC" >> $GITHUB_OUTPUT
          echo "Current FFmpeg: $FFMPEG"
          echo "Current mimalloc: $MIMALLOC"

      - name: Update build.yml
        run: |
          # Update FFmpeg ref
          sed -i "s/ref: n[0-9]\+\.[0-9]\+/ref: ${{ steps.ffmpeg.outputs.tag }}/" .github/workflows/build.yml
          # Update FFmpeg cache key
          sed -i "s/key: ffmpeg-n[0-9]\+\.[0-9]\+/key: ffmpeg-${{ steps.ffmpeg.outputs.tag }}/" .github/workflows/build.yml
          # Update mimalloc ref
          sed -i "s/ref: v[0-9]\+\.[0-9]\+\.[0-9]\+/ref: ${{ steps.mimalloc.outputs.tag }}/" .github/workflows/build.yml

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet .github/workflows/build.yml; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git diff .github/workflows/build.yml
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build.yml
          git commit -m "Update dependencies: FFmpeg ${{ steps.ffmpeg.outputs.tag }}, mimalloc ${{ steps.mimalloc.outputs.tag }}"
          git push
