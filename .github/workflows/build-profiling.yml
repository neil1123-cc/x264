name: Build Profiling

on:
  workflow_dispatch:
    inputs:
      target_cpu:
        description: 'Target CPU architecture'
        required: true
        default: 'x86-64'
        type: choice
        options:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5
      upload_profdata:
        description: 'Upload profdata to Git branch'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout x264
      uses: actions/checkout@v4
      with:
        path: x264
        fetch-depth: 0

    # === Dependency Caching ===
    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-full-v1-clang

    - name: Cache obuparse
      id: cache-obuparse
      uses: actions/cache@v4
      with:
        path: obuparse-install
        key: obuparse-latest-clang-v1

    - name: Cache L-SMASH
      id: cache-lsmash
      uses: actions/cache@v4
      with:
        path: lsmash-install
        key: lsmash-vimeo-gcc-mingw64-v1

    - name: Cache ffms2
      id: cache-ffms2
      uses: actions/cache@v4
      with:
        path: ffms2-install
        key: ffms2-latest-clang-v1

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.3.1

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash
      if: steps.cache-lsmash.outputs.cache-hit != 'true'

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          autoconf
          automake
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-x86_64-gcc

    - name: Compile FFmpeg (full with avfilter)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      working-directory: ffmpeg
      run: |
        # Full FFmpeg with avfilter for lavfi test video generation
        PGO_OPT="--enable-avdevice --enable-avfilter --enable-ffmpeg --enable-indev=lavfi"
        for f in testsrc testsrc2 smptebars nullsrc geq gradients format scale; do
          PGO_OPT="$PGO_OPT --enable-filter=$f"
        done
        ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec --enable-swscale --enable-swresample \
          --disable-everything --disable-network $PGO_OPT \
          --enable-demuxer=mpegts,mov,matroska,h264,hevc,rawvideo,yuv4mpegpipe \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-encoder=rawvideo,aac,ac3,mp2,pcm_s16le,pcm_s24le,pcm_s32le \
          --enable-muxer=yuv4mpegpipe \
          --enable-protocol=file,pipe \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      run: make install
      working-directory: ffmpeg

    - name: Checkout ffms2
      uses: actions/checkout@v4
      with:
        path: ffms2
        repository: FFMS/ffms2
      if: steps.cache-ffms2.outputs.cache-hit != 'true'

    - name: Compile ffms2 (static)
      if: steps.cache-ffms2.outputs.cache-hit != 'true'
      working-directory: ffms2
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
        ./autogen.sh
        ./configure --prefix="$GITHUB_WORKSPACE/ffms2-install" --enable-static --disable-shared
        make -j$(nproc)
        make install
        cp -r "$GITHUB_WORKSPACE/ffms2-install/"* /usr/local/

    - name: Compile mimalloc
      working-directory: mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF \
          -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
        ninja install
        # Create compatibility symlink for CMake (mimalloc v3.x uses versioned directories)
        shopt -s nullglob
        for dir in /usr/local/lib/cmake/mimalloc-*; do
          ln -s "$dir" /usr/local/lib/cmake/mimalloc
          break
        done

    - name: Compile obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'
      working-directory: obuparse
      run: |
        make CC=cc libobuparse.a
        install -d "$GITHUB_WORKSPACE/obuparse-install/include"
        install -d "$GITHUB_WORKSPACE/obuparse-install/lib"
        install -v obuparse.h "$GITHUB_WORKSPACE/obuparse-install/include"
        install -v libobuparse.a "$GITHUB_WORKSPACE/obuparse-install/lib"
        cp -r "$GITHUB_WORKSPACE/obuparse-install/"* /usr/local/

    - name: Install cached obuparse
      if: steps.cache-obuparse.outputs.cache-hit == 'true'
      run: cp -r "$GITHUB_WORKSPACE/obuparse-install/"* /usr/local/

    - name: Compile L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit != 'true'
      working-directory: lsmash
      run: |
        env MSYSTEM=MINGW64 CHERE_INVOKING=1 PATH="/mingw64/bin:/usr/bin:/clang64/bin" /usr/bin/bash -lc '
          set -euo pipefail
          export PATH="/mingw64/bin:/usr/bin:/clang64/bin"
          hash -r
          command -v gcc >/dev/null
          command -v ar >/dev/null
          command -v ranlib >/dev/null
          ./configure --prefix=/usr/local --cc=gcc \
            --extra-cflags="-I/usr/local/include -O3 -DNDEBUG -fno-lto" \
            --extra-ldflags="-L/usr/local/lib -fno-lto"
          make clean
          make lib -j$(nproc)
          make install-lib
        '
        cp importer/importer.h /usr/local/include/lsmash_importer.h
        mkdir -p "$GITHUB_WORKSPACE/lsmash-install/include" "$GITHUB_WORKSPACE/lsmash-install/lib/pkgconfig"
        cp /usr/local/include/lsmash*.h "$GITHUB_WORKSPACE/lsmash-install/include/"
        cp /usr/local/lib/liblsmash.a "$GITHUB_WORKSPACE/lsmash-install/lib/"
        cp /usr/local/lib/pkgconfig/liblsmash.pc "$GITHUB_WORKSPACE/lsmash-install/lib/pkgconfig/"

    - name: Install cached L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit == 'true'
      run: cp -r "$GITHUB_WORKSPACE/lsmash-install/"* /usr/local/

    - name: Install cached ffms2
      if: steps.cache-ffms2.outputs.cache-hit == 'true'
      run: cp -r "$GITHUB_WORKSPACE/ffms2-install/"* /usr/local/

    - name: Setup build dir
      run: mkdir -p build/prof

    - name: Compile x264 profiling version
      working-directory: build/prof
      env:
        PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        X264_TARGET_CPU: ${{ inputs.target_cpu }}
      run: |
        CC=cc ../../x264/configure --prefix=/usr/local --bit-depth=all --enable-lto --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="-O2 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -fprofile-instr-generate -fprofile-update=atomic -I/usr/local/include -I/clang64/include -I../../ffmpeg" \
          --extra-ldflags="-flto -fprofile-instr-generate -L/usr/local/lib -L/clang64/lib"
        make -j$(nproc)
        mv x264.exe x264-profiling.exe

    - name: MP4 smoke (profiling)
      if: inputs.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 8 -pix_fmt yuv420p smoke_prof.y4m
        ./build/prof/x264-profiling.exe --fps 24/1 --frames 8 --bframes 2 --keyint 4 --min-keyint 4 -o smoke_prof.mp4 smoke_prof.y4m
        ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1 smoke_prof.mp4 > smoke_prof_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames,codec_name,codec_tag_string -of default=noprint_wrappers=1 smoke_prof.mp4 > smoke_prof_stream.txt
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_prof_format.txt
        grep -q "codec_name=h264" smoke_prof_stream.txt
        grep -q "codec_tag_string=avc1" smoke_prof_stream.txt
        grep -q "nb_read_frames=8" smoke_prof_stream.txt

    - name: Package
      run: |
        mkdir dist
        cp build/prof/x264-profiling.exe dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x264-profiling-${{ inputs.target_cpu }}
        path: dist/*

    - name: Push profdata to branch
      if: inputs.upload_profdata
      run: |
        # Run a minimal workload to generate profdata
        mkdir -p test-videos
        ffmpeg -f lavfi -i "testsrc=duration=2:size=640x480:rate=30" -c:v rawvideo -pix_fmt yuv420p test-videos/test.y4m
        ./build/prof/x264-profiling.exe --crf 23 --preset medium test-videos/test.y4m -o /dev/null 2>/dev/null || true

        # Merge profdata
        llvm-profdata merge -output=default.profdata *.profraw

        # Push to branch
        cd x264
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout --orphan profdata-${{ inputs.target_cpu }}
        git rm -rf . 2>/dev/null || true
        cp ../default.profdata ./profdata
        git add profdata
        git commit -m "Update profdata for ${{ inputs.target_cpu }} - $(date +%Y%m%d)" || echo "No changes"
        git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git profdata-${{ inputs.target_cpu }}
