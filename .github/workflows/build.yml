name: Build

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: 'which tag to upload to'
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5
        toolchain:
          - clang
          #- ucrt
    steps:
    - name: Checkout x264
      uses: actions/checkout@v4
      with:
        path: x264
        fetch-depth: 0

    - name: Fetch PGO profdata
      shell: bash
      run: |
        cd x264
        git fetch origin profdata-x86-64 --depth=1 || echo "Branch not found"
        git checkout profdata-x86-64 -- x264.profdata 2>/dev/null || echo "profdata not found"
        mkdir -p ../build
        mv x264.profdata ../build/x264.profdata 2>/dev/null || echo "No profdata"

    # === Dependency Caching ===
    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-minimal-v1-${{matrix.toolchain}}

    - name: Checkout obuparse
      id: cache-obuparse
      uses: actions/cache@v4
      with:
        path: obuparse-install
        key: obuparse-latest-clang-v1

    - name: Cache L-SMASH
      id: cache-lsmash
      uses: actions/cache@v4
      with:
        path: lsmash-install
        key: lsmash-latest-clang-v1

    - name: Cache ffms2
      id: cache-ffms2
      uses: actions/cache@v4
      with:
        path: ffms2-install
        key: ffms2-latest-clang-v1

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.2.8

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash
      if: steps.cache-lsmash.outputs.cache-hit != 'true'

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          autoconf
          automake
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-compiler-rt
          mingw-w64-clang-x86_64-lld
          mingw-w64-clang-x86_64-crt
          mingw-w64-clang-x86_64-headers
          mingw-w64-clang-x86_64-libc++
          mingw-w64-clang-x86_64-libwinpthread
          mingw-w64-clang-x86_64-make
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-ucrt-x86_64-binutils

    - name: Compile FFmpeg (minimal)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      working-directory: ffmpeg
      run: |
        ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec --enable-swscale --enable-swresample \
          --disable-everything --disable-network \
          --enable-demuxer=mpegts,mov,matroska,h264,hevc,rawvideo,yuv4mpegpipe \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-protocol=file \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      run: make install
      working-directory: ffmpeg

    - name: Checkout ffms2
      uses: actions/checkout@v4
      with:
        path: ffms2
        repository: FFMS/ffms2
      if: steps.cache-ffms2.outputs.cache-hit != 'true'

    - name: Compile ffms2 (static)
      if: steps.cache-ffms2.outputs.cache-hit != 'true'
      working-directory: ffms2
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        ./autogen.sh
        ./configure --prefix="$WORKSPACE/ffms2-install" --enable-static --disable-shared
        make -j$(nproc)
        make install
        cp -r "$WORKSPACE/ffms2-install/"* /usr/local/

    - name: Compile mimalloc
      working-directory: mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF \
          -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
        ninja install
        # Create compatibility symlink for CMake (mimalloc v3.x uses versioned directories)
        shopt -s nullglob
        for dir in /usr/local/lib/cmake/mimalloc-*; do
          ln -s "$dir" /usr/local/lib/cmake/mimalloc
          break
        done

    - name: Compile obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'
      working-directory: obuparse
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        make CC=cc libobuparse.a
        install -d "$WORKSPACE/obuparse-install/include"
        install -d "$WORKSPACE/obuparse-install/lib"
        install -v obuparse.h "$WORKSPACE/obuparse-install/include"
        install -v libobuparse.a "$WORKSPACE/obuparse-install/lib"
        cp -r "$WORKSPACE/obuparse-install/"* /usr/local/

    - name: Compile L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit != 'true'
      working-directory: lsmash
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        ./configure --prefix="$WORKSPACE/lsmash-install" --cc=cc \
          --extra-cflags="-I$WORKSPACE/obuparse-install/include" \
          --extra-ldflags="-L$WORKSPACE/obuparse-install/lib" \
          --extra-libs="-lobuparse"
        make -j$(nproc)
        make install
        cp importer/importer.h "$WORKSPACE/lsmash-install/include/lsmash_importer.h"
        cp -r "$WORKSPACE/lsmash-install/"* /usr/local/

    - name: Install cached obuparse
      if: steps.cache-obuparse.outputs.cache-hit == 'true'
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        cp -r "$WORKSPACE/obuparse-install/"* /usr/local/

    - name: Install cached L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit == 'true'
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        cp -r "$WORKSPACE/lsmash-install/"* /usr/local/

    - name: Install cached ffms2
      if: steps.cache-ffms2.outputs.cache-hit == 'true'
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        cp -r "$WORKSPACE/ffms2-install/"* /usr/local/

    - name: Setup build dir
      run: mkdir -p build/8b build/10b build/all

    - name: Compile x264 8bit
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=${{matrix.target_cpu}}
        CFLAGS="-O3 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -I/usr/local/include -I/clang64/include -I../../ffmpeg"
        LDFLAGS="-flto -L/usr/local/lib -L/clang64/lib"
        if [ -f ../x264.profdata ]; then
          CFLAGS="$CFLAGS -fprofile-instr-use=../x264.profdata"
          LDFLAGS="$LDFLAGS -fprofile-instr-use=../x264.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=8 --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="$CFLAGS" \
          --extra-ldflags="$LDFLAGS"
        make -j$(nproc)
        strip -s x264.exe
      working-directory: build/8b

    - name: Compile x264 10bit
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=${{matrix.target_cpu}}
        CFLAGS="-O3 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -I/usr/local/include -I/clang64/include -I../../ffmpeg"
        LDFLAGS="-flto -L/usr/local/lib -L/clang64/lib"
        if [ -f ../x264.profdata ]; then
          CFLAGS="$CFLAGS -fprofile-instr-use=../x264.profdata"
          LDFLAGS="$LDFLAGS -fprofile-instr-use=../x264.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=10 --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="$CFLAGS" \
          --extra-ldflags="$LDFLAGS"
        make -j$(nproc)
        strip -s x264.exe
      working-directory: build/10b

    - name: Compile x264 8bit+10bit (all)
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=${{matrix.target_cpu}}
        CFLAGS="-O3 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -I/usr/local/include -I/clang64/include -I../../ffmpeg"
        LDFLAGS="-flto -L/usr/local/lib -L/clang64/lib"
        if [ -f ../x264.profdata ]; then
          CFLAGS="$CFLAGS -fprofile-instr-use=../x264.profdata"
          LDFLAGS="$LDFLAGS -fprofile-instr-use=../x264.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=all --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="$CFLAGS" \
          --extra-ldflags="$LDFLAGS"
        make -j$(nproc)
        strip -s x264.exe
      working-directory: build/all

    - name: Package
      run: |
        mkdir dist
        cp build/8b/x264.exe dist/x264-8bit.exe
        cp build/10b/x264.exe dist/x264-10bit.exe
        cp build/all/x264.exe dist/x264.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x264-win64-${{matrix.target_cpu}}-${{matrix.toolchain}}
        path: dist/*

    - name: Compress artifact for release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
      run: |
        cd dist
        7za a -t7z -mx=7 ../x264-win64-${{matrix.target_cpu}}-${{matrix.toolchain}}.${{ github.event.inputs.tag }}.7z \
          x264-8bit.exe x264-10bit.exe x264.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
      with:
        tag_name: ${{ github.event.inputs.tag }}
        files: x264-win64-${{matrix.target_cpu}}-${{matrix.toolchain}}.${{ github.event.inputs.tag }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
