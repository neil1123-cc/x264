name: Build

on:
  push:
  workflow_dispatch:
    inputs:
      tag:
        description: 'which tag to upload to'
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - x86-64
          - haswell
          - skylake
          - alderlake
          - raptorlake
          - arrowlake
          - znver2
          - znver3
          - znver4
          - znver5
        toolchain:
          - clang
          #- ucrt
    steps:
    - name: Checkout x264
      uses: actions/checkout@v4
      with:
        path: x264
        fetch-depth: 0

    - name: Fetch PGO profdata
      shell: bash
      run: |
        cd x264
        git fetch origin profdata-x86-64 --depth=1 || { echo "Branch not found"; exit 0; }
        git checkout FETCH_HEAD -- x264.profdata 2>/dev/null || echo "profdata not found"
        mkdir -p ../build
        mv x264.profdata ../build/x264.profdata 2>/dev/null || echo "No profdata"

    # === Dependency Caching ===
    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: ffmpeg
        key: ffmpeg-n8.1-minimal-v1-${{matrix.toolchain}}

    - name: Checkout obuparse
      id: cache-obuparse
      uses: actions/cache@v4
      with:
        path: obuparse-install
        key: obuparse-latest-clang-v1

    - name: Cache L-SMASH
      id: cache-lsmash
      uses: actions/cache@v4
      with:
        path: lsmash-install
        key: lsmash-vimeo-gcc-mingw64-v1

    - name: Cache ffms2
      id: cache-ffms2
      uses: actions/cache@v4
      with:
        path: ffms2-install
        key: ffms2-latest-clang-v1

    - name: Checkout FFmpeg
      uses: actions/checkout@v4
      with:
        path: ffmpeg
        repository: FFmpeg/FFmpeg
        ref: n8.1
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'

    - name: Checkout mimalloc
      uses: actions/checkout@v4
      with:
        path: mimalloc
        repository: microsoft/mimalloc
        ref: v3.3.1

    - name: Checkout obuparse
      uses: actions/checkout@v4
      with:
        path: obuparse
        repository: dwbuiten/obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'

    - name: Checkout L-SMASH
      uses: actions/checkout@v4
      with:
        path: lsmash
        repository: vimeo/l-smash
      if: steps.cache-lsmash.outputs.cache-hit != 'true'

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          p7zip
          base-devel
          git
          autoconf
          automake
          libtool
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-clang
          mingw-w64-clang-x86_64-compiler-rt
          mingw-w64-clang-x86_64-lld
          mingw-w64-clang-x86_64-crt
          mingw-w64-clang-x86_64-headers
          mingw-w64-clang-x86_64-libc++
          mingw-w64-clang-x86_64-libwinpthread
          mingw-w64-clang-x86_64-make
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-ninja
          mingw-w64-ucrt-x86_64-binutils
          mingw-w64-x86_64-gcc

    - name: Compile FFmpeg (minimal)
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      working-directory: ffmpeg
      run: |
        ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
          --disable-runtime-cpudetect --disable-all --disable-autodetect \
          --enable-avformat --enable-avcodec --enable-swscale --enable-swresample \
          --disable-everything --disable-network \
          --enable-demuxer=mpegts,mov,matroska,h264,hevc,rawvideo,yuv4mpegpipe \
          --enable-decoder=h264,hevc,ffv1,ffvhuff,huffyuv,rawvideo,wrapped_avframe,aac,ac3,mp3 \
          --enable-protocol=file \
          --cc=cc --cxx=c++ --cpu=x86-64
        make -j$(nproc)

    - name: Get rid of .dll.a
      run: find /*64/ /usr/ -type f -name "*.dll.a" -print -delete

    - name: Install FFmpeg
      run: make install
      working-directory: ffmpeg

    - name: Checkout ffms2
      uses: actions/checkout@v4
      with:
        path: ffms2
        repository: FFMS/ffms2
      if: steps.cache-ffms2.outputs.cache-hit != 'true'

    - name: Compile ffms2 (static)
      if: steps.cache-ffms2.outputs.cache-hit != 'true'
      working-directory: ffms2
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        ./autogen.sh
        ./configure --prefix="$WORKSPACE/ffms2-install" --enable-static --disable-shared
        make -j$(nproc)
        make install
        cp -r "$WORKSPACE/ffms2-install/"* /usr/local/

    - name: Compile mimalloc
      working-directory: mimalloc
      run: |
        mkdir build
        cd build
        cmake -GNinja .. -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DMI_BUILD_SHARED=OFF -DMI_BUILD_STATIC=ON -DMI_BUILD_OBJECT=OFF \
          -DMI_BUILD_TESTS=OFF -DMI_USE_CXX=ON
        ninja
        ninja install
        # Create compatibility symlink for CMake (mimalloc v3.x uses versioned directories)
        shopt -s nullglob
        for dir in /usr/local/lib/cmake/mimalloc-*; do
          ln -s "$dir" /usr/local/lib/cmake/mimalloc
          break
        done

    - name: Compile obuparse
      if: steps.cache-obuparse.outputs.cache-hit != 'true'
      working-directory: obuparse
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        make CC=cc libobuparse.a
        install -d "$WORKSPACE/obuparse-install/include"
        install -d "$WORKSPACE/obuparse-install/lib"
        install -v obuparse.h "$WORKSPACE/obuparse-install/include"
        install -v libobuparse.a "$WORKSPACE/obuparse-install/lib"
        cp -r "$WORKSPACE/obuparse-install/"* /usr/local/

    - name: Compile L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit != 'true'
      working-directory: lsmash
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        env MSYSTEM=MINGW64 CHERE_INVOKING=1 PATH="/mingw64/bin:/usr/bin:/clang64/bin" /usr/bin/bash -lc '
          set -euo pipefail
          export PATH="/mingw64/bin:/usr/bin:/clang64/bin"
          hash -r
          command -v gcc >/dev/null
          command -v ar >/dev/null
          command -v ranlib >/dev/null
          ./configure --prefix=/usr/local --cc=gcc \
            --extra-cflags="-I/usr/local/include -O3 -DNDEBUG -fno-lto" \
            --extra-ldflags="-L/usr/local/lib -fno-lto"
          make clean
          make lib -j$(nproc)
          make install-lib
        '
        cp importer/importer.h /usr/local/include/lsmash_importer.h
        mkdir -p "$WORKSPACE/lsmash-install/include" "$WORKSPACE/lsmash-install/lib/pkgconfig"
        cp /usr/local/include/lsmash*.h "$WORKSPACE/lsmash-install/include/"
        cp /usr/local/lib/liblsmash.a "$WORKSPACE/lsmash-install/lib/"
        cp /usr/local/lib/pkgconfig/lsmash.pc "$WORKSPACE/lsmash-install/lib/pkgconfig/"

    - name: Install cached obuparse
      if: steps.cache-obuparse.outputs.cache-hit == 'true'
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        cp -r "$WORKSPACE/obuparse-install/"* /usr/local/

    - name: Install cached L-SMASH
      if: steps.cache-lsmash.outputs.cache-hit == 'true'
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        cp -r "$WORKSPACE/lsmash-install/"* /usr/local/

    - name: Install cached ffms2
      if: steps.cache-ffms2.outputs.cache-hit == 'true'
      run: |
        WORKSPACE=$(cygpath -u "$GITHUB_WORKSPACE")
        cp -r "$WORKSPACE/ffms2-install/"* /usr/local/

    - name: Setup build dir
      run: mkdir -p build/8b build/10b build/all

    - name: Compile x264 8bit
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=${{matrix.target_cpu}}
        CFLAGS="-O3 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -I/usr/local/include -I/clang64/include -I../../ffmpeg"
        LDFLAGS="-flto -L/usr/local/lib -L/clang64/lib"
        if [ -f ../x264.profdata ]; then
          CFLAGS="$CFLAGS -fprofile-instr-use=../x264.profdata"
          LDFLAGS="$LDFLAGS -fprofile-instr-use=../x264.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=8 --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="$CFLAGS" \
          --extra-ldflags="$LDFLAGS"
        make -j$(nproc)
        strip -s x264.exe
      working-directory: build/8b

    - name: Compile x264 10bit
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=${{matrix.target_cpu}}
        CFLAGS="-O3 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -I/usr/local/include -I/clang64/include -I../../ffmpeg"
        LDFLAGS="-flto -L/usr/local/lib -L/clang64/lib"
        if [ -f ../x264.profdata ]; then
          CFLAGS="$CFLAGS -fprofile-instr-use=../x264.profdata"
          LDFLAGS="$LDFLAGS -fprofile-instr-use=../x264.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=10 --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="$CFLAGS" \
          --extra-ldflags="$LDFLAGS"
        make -j$(nproc)
        strip -s x264.exe
      working-directory: build/10b

    - name: Compile x264 8bit+10bit (all)
      run: |
        export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/clang64/lib/pkgconfig
        export X264_TARGET_CPU=${{matrix.target_cpu}}
        CFLAGS="-O3 -flto -ffat-lto-objects -fmerge-all-constants -momit-leaf-frame-pointer -I/usr/local/include -I/clang64/include -I../../ffmpeg"
        LDFLAGS="-flto -L/usr/local/lib -L/clang64/lib"
        if [ -f ../x264.profdata ]; then
          CFLAGS="$CFLAGS -fprofile-instr-use=../x264.profdata"
          LDFLAGS="$LDFLAGS -fprofile-instr-use=../x264.profdata"
          echo "Using PGO profdata"
        else
          echo "Building without PGO"
        fi
        CC=cc RC=/ucrt64/bin/windres ../../x264/configure --prefix=/usr/local --bit-depth=all --enable-lavf --enable-lsmash --enable-static \
          --extra-cflags="$CFLAGS" \
          --extra-ldflags="$LDFLAGS"
        make -j$(nproc)
        strip -s x264.exe
      working-directory: build/all

    - name: MP4 smoke (8bit CLI)
      if: matrix.target_cpu == 'x86-64'
      run: |
        trap 'status=$?; if [ $status -ne 0 ]; then echo "=== x264 mp4 smoke diagnostics ==="; for f in smoke_format.txt smoke_stream.txt smoke_timing.txt smoke_count.txt smoke_packets.csv smoke_frames.csv; do if [ -f "$f" ]; then echo "--- $f ---"; cat "$f"; fi; done; fi; exit $status' EXIT
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 16 -pix_fmt yuv420p smoke.y4m
        build/8b/x264.exe --fps 24/1 --frames 16 --bframes 4 --keyint 8 --min-keyint 8 --no-open-gop -o smoke.mp4 smoke.y4m
        ffprobe -v error -show_streams -select_streams v:0 smoke.mp4 > smoke_stream.txt
        ffprobe -v error -show_entries stream=time_base,r_frame_rate,avg_frame_rate,duration,nal_length_size -select_streams v:0 -of default=noprint_wrappers=1 smoke.mp4 > smoke_timing.txt
        ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 smoke.mp4 > smoke_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke.mp4 > smoke_count.txt
        ffprobe -v error -show_packets -select_streams v:0 -show_entries packet=flags -of csv=p=0 smoke.mp4 > smoke_packets.csv
        ffprobe -v error -select_streams v:0 -show_entries frame=pts_time,pkt_dts_time,pkt_duration_time,key_frame -of csv=p=0 smoke.mp4 > smoke_frames.csv
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_format.txt
        grep -q "duration=" smoke_format.txt
        grep -q "codec_name=h264" smoke_stream.txt
        grep -q "codec_tag_string=avc1" smoke_stream.txt
        grep -q "codec_type=video" smoke_stream.txt
        grep -q "width=128" smoke_stream.txt
        grep -q "height=72" smoke_stream.txt
        grep -q "pix_fmt=yuv420p" smoke_stream.txt
        awk -F= '/^extradata_size=/{ if (($2+0) > 0) found=1 } END { if (!found) exit 1 }' smoke_stream.txt
        grep -q "time_base=" smoke_timing.txt
        grep -q "r_frame_rate=24/1" smoke_timing.txt
        grep -q "avg_frame_rate=24/1" smoke_timing.txt
        grep -q "nb_read_frames=16" smoke_count.txt
        test -s smoke_packets.csv
        test -s smoke_frames.csv
        awk -F, 'NR == 1 { if ($1 !~ /K/) exit 1 } END { if (NR != 16) exit 1 }' smoke_packets.csv
        awk -F, 'NF >= 3 && $3 != "N/A" { if (seen && ($3+0) < prev) exit 1; prev=$3+0; seen=1 } END { if (!seen) exit 1 }' smoke_frames.csv
        awk -F, 'NF >= 3 && $2 != "N/A" && $3 != "N/A" { if (($2+0) > ($3+0)) diff=1 } END { if (!diff) exit 1 }' smoke_frames.csv
        awk -F, 'NR == 1 { if (NF < 1 || $1 != 1) exit 1 }' smoke_frames.csv
        awk -F, 'END { if (NR != 16) exit 1 }' smoke_frames.csv

    - name: MP4 smoke (8bit CLI open GOP)
      if: matrix.target_cpu == 'x86-64'
      run: |
        trap 'status=$?; if [ $status -ne 0 ]; then echo "=== x264 mp4 open-gop diagnostics ==="; for f in smoke_open_format.txt smoke_open_stream.txt smoke_open_timing.txt smoke_open_count.txt smoke_open_packets.csv smoke_open_frames.csv; do if [ -f "$f" ]; then echo "--- $f ---"; cat "$f"; fi; done; fi; exit $status' EXIT
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 16 -pix_fmt yuv420p smoke_open.y4m
        build/8b/x264.exe --fps 24/1 --frames 16 --bframes 4 --keyint 8 --min-keyint 8 --open-gop -o smoke_open.mp4 smoke_open.y4m
        ffprobe -v error -show_streams -select_streams v:0 smoke_open.mp4 > smoke_open_stream.txt
        ffprobe -v error -show_entries stream=time_base,r_frame_rate,avg_frame_rate,duration,nal_length_size -select_streams v:0 -of default=noprint_wrappers=1 smoke_open.mp4 > smoke_open_timing.txt
        ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 smoke_open.mp4 > smoke_open_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke_open.mp4 > smoke_open_count.txt
        ffprobe -v error -show_packets -select_streams v:0 -show_entries packet=pts_time,dts_time,flags -of csv=p=0 smoke_open.mp4 > smoke_open_packets.csv
        ffprobe -v error -select_streams v:0 -show_entries frame=pts_time,pkt_dts_time,pkt_duration_time,key_frame -of csv=p=0 smoke_open.mp4 > smoke_open_frames.csv
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_open_format.txt
        grep -q "codec_name=h264" smoke_open_stream.txt
        grep -q "codec_tag_string=avc1" smoke_open_stream.txt
        grep -q "nb_read_frames=16" smoke_open_count.txt
        test -s smoke_open_packets.csv
        test -s smoke_open_frames.csv
        awk -F, 'NR == 1 { if (NF < 3 || $3 !~ /K/) exit 1 } END { if (NR != 16) exit 1 }' smoke_open_packets.csv
        awk -F, 'NF >= 3 && $1 != "N/A" && $2 != "N/A" { if (($1+0) > ($2+0)) diff=1 } END { if (!diff) exit 1 }' smoke_open_packets.csv
        awk -F, 'NF >= 3 && $3 != "N/A" { if (seen && ($3+0) < prev) exit 1; prev=$3+0; seen=1 } END { if (!seen) exit 1 }' smoke_open_frames.csv

    - name: MP4 smoke (8bit CLI single frame)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 1 -pix_fmt yuv420p smoke_single.y4m
        build/8b/x264.exe --fps 24/1 --frames 1 --bframes 0 --keyint 1 --min-keyint 1 -o smoke_single.mp4 smoke_single.y4m
        ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 smoke_single.mp4 > smoke_single_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke_single.mp4 > smoke_single_count.txt
        ffprobe -v error -show_packets -select_streams v:0 -show_entries packet=flags -of csv=p=0 smoke_single.mp4 > smoke_single_packets.csv
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_single_format.txt
        grep -q "nb_read_frames=1" smoke_single_count.txt
        awk -F, 'NR == 1 { if ($1 !~ /K/) exit 1 } END { if (NR != 1) exit 1 }' smoke_single_packets.csv

    - name: MP4 smoke (8bit CLI 24000/1001)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24000/1001 -frames:v 1 -pix_fmt yuv420p smoke_frac.y4m
        build/8b/x264.exe --fps 24000/1001 --frames 1 --bframes 0 --keyint 1 --min-keyint 1 -o smoke_frac.mp4 smoke_frac.y4m
        ffprobe -v error -show_entries stream=r_frame_rate,avg_frame_rate -select_streams v:0 -of default=noprint_wrappers=1 smoke_frac.mp4 > smoke_frac_timing.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke_frac.mp4 > smoke_frac_count.txt
        grep -q "r_frame_rate=24000/1001" smoke_frac_timing.txt
        grep -q "avg_frame_rate=24000/1001" smoke_frac_timing.txt
        grep -q "nb_read_frames=1" smoke_frac_count.txt

    - name: MP4 smoke (8bit CLI AUD request stays valid)
      if: matrix.target_cpu == 'x86-64'
      run: |
        ffmpeg -hide_banner -loglevel error -f lavfi -i testsrc2=size=128x72:rate=24 -frames:v 16 -pix_fmt yuv420p smoke_aud.y4m
        build/8b/x264.exe --fps 24/1 --frames 16 --bframes 4 --keyint 8 --min-keyint 8 --aud -o smoke_aud.mp4 smoke_aud.y4m
        ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1 smoke_aud.mp4 > smoke_aud_format.txt
        ffprobe -v error -count_frames -select_streams v:0 -show_entries stream=nb_read_frames -of default=noprint_wrappers=1 smoke_aud.mp4 > smoke_aud_count.txt
        ffprobe -v error -show_packets -select_streams v:0 -show_entries packet=pts_time,dts_time,flags -of csv=p=0 smoke_aud.mp4 > smoke_aud_packets.csv
        grep -q "format_name=mov,mp4,m4a,3gp,3g2,mj2" smoke_aud_format.txt
        grep -q "nb_read_frames=16" smoke_aud_count.txt
        test -s smoke_aud_packets.csv

    - name: Package
      run: |
        mkdir dist
        cp build/8b/x264.exe dist/x264-8bit.exe
        cp build/10b/x264.exe dist/x264-10bit.exe
        cp build/all/x264.exe dist/x264.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: x264-win64-${{matrix.target_cpu}}-${{matrix.toolchain}}
        path: dist/*

    - name: Compress artifact for release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
      run: |
        cd dist
        7za a -t7z -mx=7 ../x264-win64-${{matrix.target_cpu}}-${{matrix.toolchain}}.${{ github.event.inputs.tag }}.7z \
          x264-8bit.exe x264-10bit.exe x264.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
      with:
        tag_name: ${{ github.event.inputs.tag }}
        files: x264-win64-${{matrix.target_cpu}}-${{matrix.toolchain}}.${{ github.event.inputs.tag }}.7z
        fail_on_unmatched_files: true
        generate_release_notes: false
        prerelease: true
